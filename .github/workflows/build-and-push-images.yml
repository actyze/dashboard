name: Build and Push Docker Images

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all images'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  # Detect which services have changes to optimize build times
  # 
  # Build Triggers:
  # - frontend/      → builds frontend only
  # - nexus/         → builds nexus only
  # - schema-service/ → builds schema-service only
  # - [build-all] in commit message → builds all 3 services
  # - Manual workflow dispatch with force_build=true → builds all 3 services
  # - Workflow file changes do NOT trigger builds (use [build-all] flag if needed)
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      nexus: ${{ steps.filter.outputs.nexus }}
      schema: ${{ steps.filter.outputs.schema }}
      build-all: ${{ steps.check-build-all.outputs.build-all }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to detect changes
      
      - name: Check for build-all flag
        id: check-build-all
        run: |
          # Build all if manual dispatch with force_build, or commit message contains [build-all]
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_build }}" == "true" ]]; then
            echo "build-all=true" >> $GITHUB_OUTPUT
            echo "🚀 Force build all images (workflow_dispatch)"
          elif echo "${{ github.event.head_commit.message }}" | grep -q "\[build-all\]"; then
            echo "build-all=true" >> $GITHUB_OUTPUT
            echo "🚀 Build all images ([build-all] flag detected)"
          else
            echo "build-all=false" >> $GITHUB_OUTPUT
            echo "📦 Conditional build based on file changes"
          fi
      
      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            frontend:
              - 'frontend/**'
            nexus:
              - 'nexus/**'
            schema:
              - 'schema-service/**'

  build-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' || 
      needs.detect-changes.outputs.build-all == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/actyze/dashboard-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            REACT_APP_API_BASE_URL=/api

  build-nexus:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.nexus == 'true' || 
      needs.detect-changes.outputs.build-all == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/actyze/dashboard-nexus
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./nexus
          file: ./nexus/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-schema-service:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.schema == 'true' || 
      needs.detect-changes.outputs.build-all == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h
          echo ""
          
          echo "=== Removing unnecessary tools ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          
          echo "=== Cleaning package manager caches ==="
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
          echo "=== Cleaning Docker completely ==="
          docker buildx prune -af --verbose || true
          docker system prune -af --volumes
          sudo rm -rf /var/lib/docker/tmp/* || true
          
          echo ""
          echo "=== Disk space AFTER cleanup ==="
          df -h
          echo ""
          echo "=== Docker disk usage ==="
          docker system df

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/actyze/dashboard-schema-service
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./schema-service
          file: ./schema-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  update-deployment-configs:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-nexus, build-schema-service]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && (
        needs.build-frontend.result == 'success' ||
        needs.build-nexus.result == 'success' ||
        needs.build-schema-service.result == 'success'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Collect built image information
        id: collect-images
        run: |
          echo "📦 Collecting information about built images..."
          IMAGES_BUILT=""
          
          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            FRONTEND_TAG=$(echo "${{ needs.build-frontend.outputs.image-tag }}" | head -n1)
            echo "frontend-tag=$FRONTEND_TAG" >> $GITHUB_OUTPUT
            IMAGES_BUILT="$IMAGES_BUILT\n- Frontend: $FRONTEND_TAG"
            echo "✅ Frontend: $FRONTEND_TAG"
          fi
          
          if [[ "${{ needs.build-nexus.result }}" == "success" ]]; then
            NEXUS_TAG=$(echo "${{ needs.build-nexus.outputs.image-tag }}" | head -n1)
            echo "nexus-tag=$NEXUS_TAG" >> $GITHUB_OUTPUT
            IMAGES_BUILT="$IMAGES_BUILT\n- Nexus: $NEXUS_TAG"
            echo "✅ Nexus: $NEXUS_TAG"
          fi
          
          if [[ "${{ needs.build-schema-service.result }}" == "success" ]]; then
            SCHEMA_TAG=$(echo "${{ needs.build-schema-service.outputs.image-tag }}" | head -n1)
            echo "schema-tag=$SCHEMA_TAG" >> $GITHUB_OUTPUT
            IMAGES_BUILT="$IMAGES_BUILT\n- Schema Service: $SCHEMA_TAG"
            echo "✅ Schema Service: $SCHEMA_TAG"
          fi
          echo "images-built=$IMAGES_BUILT" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        if: steps.collect-images.outputs.images-built != ''
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update deployment configs with new Docker images"
          title: "Update deployment configs with new Docker images"
          body: |
            This PR updates the deployment configurations with newly built Docker images:
            ${{ steps.collect-images.outputs.images-built }}
            
            Note: Trino uses the official trinodb/trino image (not built by this workflow)
            
            Auto-generated by GitHub Actions.
          branch: update-docker-images-${{ github.run_number }}
          delete-branch: true

  security-scan:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-nexus, build-schema-service]
    if: |
      always() && (
        needs.build-frontend.result == 'success' ||
        needs.build-nexus.result == 'success' ||
        needs.build-schema-service.result == 'success'
      )
    continue-on-error: true
    steps:
      - name: Extract single image tags for scanning
        id: extract-tags
        run: |
          # Extract first tag from multi-line output for each service
          # Only extract if the build job succeeded
          FRONTEND_TAG=""
          NEXUS_TAG=""
          SCHEMA_TAG=""
          
          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            FRONTEND_TAG=$(echo "${{ needs.build-frontend.outputs.image-tag }}" | head -n1 | tr -d '\n')
          fi
          
          if [[ "${{ needs.build-nexus.result }}" == "success" ]]; then
            NEXUS_TAG=$(echo "${{ needs.build-nexus.outputs.image-tag }}" | head -n1 | tr -d '\n')
          fi
          
          if [[ "${{ needs.build-schema-service.result }}" == "success" ]]; then
            SCHEMA_TAG=$(echo "${{ needs.build-schema-service.outputs.image-tag }}" | head -n1 | tr -d '\n')
          fi
          
          echo "frontend-tag=$FRONTEND_TAG" >> $GITHUB_OUTPUT
          echo "nexus-tag=$NEXUS_TAG" >> $GITHUB_OUTPUT
          echo "schema-tag=$SCHEMA_TAG" >> $GITHUB_OUTPUT
          
          echo "Extracted tags for security scanning:"
          echo "Frontend: ${FRONTEND_TAG:-SKIPPED}"
          echo "Nexus: ${NEXUS_TAG:-SKIPPED}"
          echo "Schema: ${SCHEMA_TAG:-SKIPPED}"

      - name: Run Trivy vulnerability scanner - Frontend
        if: steps.extract-tags.outputs.frontend-tag != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.extract-tags.outputs.frontend-tag }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      - name: Run Trivy vulnerability scanner - Nexus
        if: steps.extract-tags.outputs.nexus-tag != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.extract-tags.outputs.nexus-tag }}
          format: 'sarif'
          output: 'trivy-nexus.sarif'

      - name: Run Trivy vulnerability scanner - Schema Service
        if: steps.extract-tags.outputs.schema-tag != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.extract-tags.outputs.schema-tag }}
          format: 'sarif'
          output: 'trivy-schema.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        if: success()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: '.'
  
  # Final job to ensure workflow is marked as success if builds succeeded
  # This prevents deployment workflow from being skipped due to optional job failures
  build-complete:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-nexus, build-schema-service]
    if: always()
    steps:
      - name: Check build status
        run: |
          echo "Build Status Summary:"
          echo "  Frontend: ${{ needs.build-frontend.result }}"
          echo "  Nexus: ${{ needs.build-nexus.result }}"
          echo "  Schema Service: ${{ needs.build-schema-service.result }}"
          
          # Fail only if ALL builds failed or were skipped
          if [[ "${{ needs.build-frontend.result }}" != "success" ]] && \
             [[ "${{ needs.build-nexus.result }}" != "success" ]] && \
             [[ "${{ needs.build-schema-service.result }}" != "success" ]]; then
            echo "❌ No builds succeeded - failing workflow"
            exit 1
          fi
          
          echo "✅ At least one build succeeded - workflow marked as success"
