name: Build and Push Docker Images

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all images'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  # Detect which services have changes to optimize build times
  # 
  # Build Triggers:
  # - frontend/      → builds frontend only
  # - nexus/         → builds nexus only
  # - schema-service/ → builds schema-service only
  # - [build-all] in commit message → builds all 3 services
  # - Manual workflow dispatch with force_build=true → builds all 3 services
  # - Workflow file changes do NOT trigger builds (use [build-all] flag if needed)
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      nexus: ${{ steps.filter.outputs.nexus }}
      schema: ${{ steps.filter.outputs.schema }}
      build-all: ${{ steps.check-build-all.outputs.build-all }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to detect changes
      
      - name: Check for build-all flag
        id: check-build-all
        run: |
          # Build all if manual dispatch with force_build, or commit message contains [build-all]
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_build }}" == "true" ]]; then
            echo "build-all=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.head_commit.message }}" == *"[build-all]"* ]]; then
            echo "build-all=true" >> $GITHUB_OUTPUT
          else
            echo "build-all=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Detect file changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            nexus:
              - 'nexus/**'
            schema:
              - 'schema-service/**'

  build-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' || 
      needs.detect-changes.outputs.build-all == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build React app
        run: |
          cd frontend
          # Disable ESLint warnings as errors for production build
          CI=false npm run build

      - name: Obfuscate JavaScript code
        working-directory: ./frontend
        run: |
          # Lightweight JavaScript obfuscation to avoid memory issues
          echo "Applying lightweight JavaScript obfuscation..."
          find build/static/js -name "*.js" | while read file; do
            echo "Processing: $file"
            # Use terser for lightweight minification and basic obfuscation
            npx terser "$file" \
              --compress drop_console=true,drop_debugger=true,pure_funcs=['console.log','console.info','console.warn'] \
              --mangle \
              --output "$file"
          done
          
          # Remove source maps for security
          find build -name "*.map" -delete
          
          # Remove console.log statements
          find build -name "*.js" -exec sed -i 's/console\.log([^;]*);*//g' {} \;

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/actyze/dashboard-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            REACT_APP_API_BASE_URL=/api

  build-nexus:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.nexus == 'true' || 
      needs.detect-changes.outputs.build-all == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install obfuscation dependencies
        run: |
          pip install python-minifier

      - name: Obfuscate Python code
        working-directory: ./nexus
        run: |
          # Minify Python files
          echo "Minifying Python source code..."
          
          # Find all Python files and minify them
          find . -name "*.py" | while read file; do
            echo "Minifying: $file"
            # Create backup
            cp "$file" "$file.bak"
            # Minify (remove comments, docstrings, extra whitespace)
            python-minifier "$file.bak" > "$file" || cp "$file.bak" "$file"
            # Remove backup
            rm "$file.bak"
          done
          
          # Add python-minifier to requirements for runtime
          echo "python-minifier" >> requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/actyze/dashboard-nexus
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./nexus
          file: ./nexus/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-schema-service:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.schema == 'true' || 
      needs.detect-changes.outputs.build-all == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove unnecessary packages and files
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af --volumes
          echo "Disk space after cleanup:"
          df -h

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install obfuscation dependencies
        run: |
          pip install python-minifier

      - name: Obfuscate Schema Service code
        working-directory: ./schema-service
        run: |
          # Create backup and minify Python files
          echo "Minifying Schema Service Python code..."
          
          # Find all Python files and minify them
          find . -name "*.py" | while read file; do
            echo "Minifying: $file"
            # Create backup
            cp "$file" "$file.bak"
            # Minify (remove comments, docstrings, extra whitespace)
            python-minifier "$file.bak" > "$file" || cp "$file.bak" "$file"
            # Remove backup
            rm "$file.bak"
          done
          
          # Add python-minifier to requirements for runtime
          echo "python-minifier" >> requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/actyze/dashboard-schema-service
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./schema-service
          file: ./schema-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          # Note: Building for both amd64 and arm64 architectures
          # The schema service image is large (~2-5GB) with ML models
          # GitHub Actions has sufficient disk space with cleanup step above

  update-deployment-configs:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-nexus, build-schema-service]
    # Run only if on main/develop AND at least one build job ran
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && (
        needs.build-frontend.result == 'success' ||
        needs.build-nexus.result == 'success' ||
        needs.build-schema-service.result == 'success'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect built image information
        id: collect-images
        run: |
          echo "📦 Collecting information about built images..."
          IMAGES_BUILT=""
          
          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            FRONTEND_TAG=$(echo "${{ needs.build-frontend.outputs.image-tag }}" | head -n1)
            echo "frontend-tag=$FRONTEND_TAG" >> $GITHUB_OUTPUT
            IMAGES_BUILT="$IMAGES_BUILT\n- Frontend: $FRONTEND_TAG"
            echo "✅ Frontend: $FRONTEND_TAG"
          fi
          
          if [[ "${{ needs.build-nexus.result }}" == "success" ]]; then
            NEXUS_TAG=$(echo "${{ needs.build-nexus.outputs.image-tag }}" | head -n1)
            echo "nexus-tag=$NEXUS_TAG" >> $GITHUB_OUTPUT
            IMAGES_BUILT="$IMAGES_BUILT\n- Nexus: $NEXUS_TAG"
            echo "✅ Nexus: $NEXUS_TAG"
          fi
          
          if [[ "${{ needs.build-schema-service.result }}" == "success" ]]; then
            SCHEMA_TAG=$(echo "${{ needs.build-schema-service.outputs.image-tag }}" | head -n1)
            echo "schema-tag=$SCHEMA_TAG" >> $GITHUB_OUTPUT
            IMAGES_BUILT="$IMAGES_BUILT\n- Schema Service: $SCHEMA_TAG"
            echo "✅ Schema Service: $SCHEMA_TAG"
          fi
          
          echo -e "$IMAGES_BUILT" > /tmp/images-built.txt

      - name: Create deployment update notification
        run: |
          echo "📝 New Docker images are available on Docker Hub:"
          cat /tmp/images-built.txt
          echo ""
          echo "To use these images:"
          echo "  1. Update your Helm values or docker-compose files"
          echo "  2. Deploy using: helm upgrade or docker-compose up"
          echo ""
          echo "Note: Helm charts in .helm-charts/ use 'latest' tag by default"
  security-scan:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-nexus, build-schema-service]
    # Run only if at least one build job ran (not skipped)
    if: |
      always() && (
        needs.build-frontend.result == 'success' ||
        needs.build-nexus.result == 'success' ||
        needs.build-schema-service.result == 'success'
      )
    steps:
      - name: Extract and validate image tags
        id: extract-tags
        run: |
          # Only extract tags for builds that actually succeeded
          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            FRONTEND_TAG=$(echo "${{ needs.build-frontend.outputs.image-tag }}" | head -n1 | tr -d '\n')
            echo "frontend-tag=$FRONTEND_TAG" >> $GITHUB_OUTPUT
            echo "scan-frontend=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend built: $FRONTEND_TAG"
          else
            echo "scan-frontend=false" >> $GITHUB_OUTPUT
            echo "⏭️  Frontend: skipped"
          fi
          
          if [[ "${{ needs.build-nexus.result }}" == "success" ]]; then
            NEXUS_TAG=$(echo "${{ needs.build-nexus.outputs.image-tag }}" | head -n1 | tr -d '\n')
            echo "nexus-tag=$NEXUS_TAG" >> $GITHUB_OUTPUT
            echo "scan-nexus=true" >> $GITHUB_OUTPUT
            echo "✅ Nexus built: $NEXUS_TAG"
          else
            echo "scan-nexus=false" >> $GITHUB_OUTPUT
            echo "⏭️  Nexus: skipped"
          fi
          
          if [[ "${{ needs.build-schema-service.result }}" == "success" ]]; then
            SCHEMA_TAG=$(echo "${{ needs.build-schema-service.outputs.image-tag }}" | head -n1 | tr -d '\n')
            echo "schema-tag=$SCHEMA_TAG" >> $GITHUB_OUTPUT
            echo "scan-schema=true" >> $GITHUB_OUTPUT
            echo "✅ Schema Service built: $SCHEMA_TAG"
          else
            echo "scan-schema=false" >> $GITHUB_OUTPUT
            echo "⏭️  Schema Service: skipped"
          fi

      - name: Run Trivy vulnerability scanner - Frontend
        if: steps.extract-tags.outputs.scan-frontend == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.extract-tags.outputs.frontend-tag }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      - name: Run Trivy vulnerability scanner - Nexus
        if: steps.extract-tags.outputs.scan-nexus == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.extract-tags.outputs.nexus-tag }}
          format: 'sarif'
          output: 'trivy-nexus.sarif'

      - name: Run Trivy vulnerability scanner - Schema Service
        if: steps.extract-tags.outputs.scan-schema == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.extract-tags.outputs.schema-tag }}
          format: 'sarif'
          output: 'trivy-schema.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()  # Upload even if some scans were skipped
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: '.'
  # Final job to ensure workflow is marked as success if builds succeeded
  # This prevents deployment workflow from being skipped due to optional job failures
  build-complete:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-nexus, build-schema-service]
    if: always()
    steps:
      - name: Check build status
        run: |
          echo "Build Status Summary:"
          echo "  Frontend: ${{ needs.build-frontend.result }}"
          echo "  Nexus: ${{ needs.build-nexus.result }}"
          echo "  Schema Service: ${{ needs.build-schema-service.result }}"
          
          # Fail only if ALL builds failed or were skipped
          if [[ "${{ needs.build-frontend.result }}" != "success" ]] && \
             [[ "${{ needs.build-nexus.result }}" != "success" ]] && \
             [[ "${{ needs.build-schema-service.result }}" != "success" ]]; then
            echo "❌ No builds succeeded - failing workflow"
            exit 1
          fi
          
          echo "✅ At least one build succeeded - workflow marked as success"
