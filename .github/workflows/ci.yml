name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Lint changed Python files only
        run: |
          # Get list of changed .py files in this PR
          CHANGED=$(git diff --name-only --diff-filter=d origin/main...HEAD -- 'nexus/**.py' || true)
          if [ -z "$CHANGED" ]; then
            echo "No Python files changed — skipping lint"
          else
            echo "Linting changed files:"
            echo "$CHANGED"
            echo "$CHANGED" | xargs ruff check --config nexus/ruff.toml
          fi

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r nexus/requirements.txt
      - run: pip install pytest pytest-cov pytest-asyncio
      - name: Ensure psql is available (for integration test migrations)
        run: psql --version || sudo apt-get install -y postgresql-client
      - name: Run unit tests
        run: pytest nexus/tests/ --ignore=nexus/tests/integration --cov=nexus -q
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      - name: Run integration tests (real database)
        run: pytest nexus/tests/integration/ -q
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DATABASE: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test -- --coverage --watchAll=false
        working-directory: frontend

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: frontend
            name: frontend
          - context: nexus
            name: nexus
          - context: schema-service
            name: schema-service
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ${{ matrix.name }}:ci-test ./${{ matrix.context }}
