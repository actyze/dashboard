name: Dependabot Monthly Tracking Issue

# Opens a tracking issue on the 1st of each month that digests the currently
# open Dependabot PRs, so every monthly dependency run has a single home that
# maintainers can triage from. Runs on the same monthly cadence as the
# Dependabot config (.github/dependabot.yml). Also manually triggerable.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of every month
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: read

jobs:
  tracking-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create monthly dependency tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          month="$(date -u +'%B %Y')"

          prs="$(gh pr list --repo "$REPO" --author 'app/dependabot' \
                   --state open --limit 100 \
                   --json number,title,url \
                   --jq '.[] | "- [ ] [#\(.number)](\(.url)) — \(.title)"')"
          [ -n "$prs" ] || prs="_No open Dependabot PRs when this issue was created. They will land here after the monthly run completes._"

          {
            printf '## Dependency updates — %s\n\n' "$month"
            printf 'Tracking issue for this month'"'"'s Dependabot run. Grouped minor/patch PRs are bundled; major-version bumps arrive as individual PRs for review.\n\n'
            printf '### Open Dependabot PRs\n'
            printf '%s\n\n' "$prs"
            printf -- '---\n'
            printf '_Auto-generated by `.github/workflows/dependabot-monthly-issue.yml`._\n'
          } > issue-body.md

          gh issue create --repo "$REPO" \
            --title "Dependency updates — $month" \
            --label dependencies \
            --body-file issue-body.md
