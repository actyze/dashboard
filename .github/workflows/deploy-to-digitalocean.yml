name: Deploy to DigitalOcean

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - production
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main

env:
  CLUSTER_NAME: REDACTED_CLUSTER
  NAMESPACE: dashboard
  HELM_RELEASE: dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if the build workflow succeeded (or manual trigger)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout dashboard repository
        uses: actions/checkout@v4
        with:
          path: dashboard

      # Helm charts are now included in the dashboard repo under .helm-charts/
      # - name: Checkout helm-charts repository
      #   uses: actions/checkout@v4
      #   with:
      #     repository: ${{ github.repository_owner }}/helm-charts
      #     path: helm-charts
      #     token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Set up kubectl
        run: |
          doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}
          kubectl version --client

      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Create values-secrets.yaml from GitHub Secrets
        run: |
          cat > /tmp/values-secrets.yaml <<EOF
          secrets:
            create: true
            externalLLM:
              apiKey: "${{ secrets.ANTHROPIC_API_KEY }}"
            trino:
              username: "admin"
              password: ""
            postgres:
              username: "${{ secrets.POSTGRES_USERNAME }}"
              password: "${{ secrets.POSTGRES_PASSWORD }}"

          nexus:
            env:
              trino:
                host: "dashboard-trino"
                port: 8080
                catalog: "postgres"
                schema: "public"
                ssl: false
                sslVerification: "NONE"
              schemaServiceKey: "${{ secrets.SCHEMA_SERVICE_KEY }}"

          schemaService:
            env:
              trino:
                host: "dashboard-trino"
                port: 8080
                catalog: "postgres"
                schema: "public"
                ssl: false
                sslVerification: "NONE"
              schemaServiceKey: "${{ secrets.SCHEMA_SERVICE_KEY }}"

          trino:
            catalogs:
              mongodb:
                connector.name: "mongodb"
                mongodb.connection-url: "${{ secrets.MONGODB_CONNECTION_URL }}"
              snowflake:
                connector.name: "snowflake"
                connection-url: "${{ secrets.SNOWFLAKE_CONNECTION_URL }}"
                connection-user: "${{ secrets.SNOWFLAKE_USERNAME }}"
                connection-password: "${{ secrets.SNOWFLAKE_PASSWORD }}"

          migrations:
            runDML: false
          EOF

      - name: Deploy with Helm
        run: |
          # Helm charts are in .helm-charts/ directory
          cd dashboard/.helm-charts
          
          # Verify Helm chart exists
          ls -la dashboard/
          
          helm upgrade --install ${{ env.HELM_RELEASE }} ./dashboard \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values dashboard/values.yaml \
            --values dashboard/values-production-balanced.yaml \
            --values dashboard/values-digitalocean-fixes.yaml \
            --values /tmp/values-secrets.yaml \
            --set frontend.image.tag=latest \
            --set nexus.image.tag=latest \
            --set schemaService.image.tag=latest \
            --timeout 15m \
            --wait

      - name: Verify deployment
        run: |
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=ready pod \
            --selector=app.kubernetes.io/instance=dashboard \
            --namespace=${{ env.NAMESPACE }} \
            --timeout=300s || true
          
          echo "Deployment status:"
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get services -n ${{ env.NAMESPACE }}
          kubectl get ingress -n ${{ env.NAMESPACE }}
          kubectl get certificate -n ${{ env.NAMESPACE }}

      - name: Rollout status
        run: |
          kubectl rollout status deployment/dashboard-frontend -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/dashboard-nexus -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/dashboard-schema-service -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/dashboard-trino -n ${{ env.NAMESPACE }}

      - name: Get deployment URL
        run: |
          INGRESS_IP=$(kubectl get ingress dashboard-ingress -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          INGRESS_HOST=$(kubectl get ingress dashboard-ingress -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.rules[0].host}')
          echo "🎉 Deployment successful!"
          echo "📍 URL: https://$INGRESS_HOST"
          echo "📍 IP: $INGRESS_IP"
          echo "::notice title=Deployment Success::Dashboard deployed to https://$INGRESS_HOST"

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/values-secrets.yaml

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send deployment notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to DigitalOcean succeeded!"
          else
            echo "❌ Deployment to DigitalOcean failed!"
            exit 1
          fi
