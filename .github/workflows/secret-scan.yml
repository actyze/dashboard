name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # Scan the current working-tree state only (--no-git). Scanning git history
      # would flag legacy commits that already exist on main and that this workflow
      # cannot fix from inside CI. The state-only scan blocks any NEW secret added
      # to HEAD on a PR or push to main; historical leaks must be remediated via
      # rotation + (optionally) history rewrite.
      - name: Run gitleaks
        run: gitleaks detect --no-git --source=. --redact --no-banner --exit-code 1
