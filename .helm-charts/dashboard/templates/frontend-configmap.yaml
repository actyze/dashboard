{{- if .Values.services.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.fullname" . }}-frontend-entrypoint
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.frontend.labels" . | nindent 4 }}
data:
  docker-entrypoint.sh: |
    #!/bin/sh
    # Frontend Runtime Configuration - Google Analytics Injection
    # Managed by: .helm-charts/dashboard (demo deployment only)
    # 
    # This script injects Google Analytics tracking code into index.html at container startup
    # For customer deployments, REACT_APP_GA_TRACKING_ID is not set, so GA is not injected

    set -e

    INDEX_HTML="/usr/share/nginx/html/index.html"
    PLACEHOLDER='<meta name="ga-placeholder" content="REPLACE_ME_AT_RUNTIME" />'

    echo "🔧 Configuring frontend for deployment..."

    # Check if Google Analytics tracking ID is provided
    if [ -n "$REACT_APP_GA_TRACKING_ID" ]; then
      echo "✅ Google Analytics enabled - Tracking ID: $REACT_APP_GA_TRACKING_ID"
      
      # Create GA scripts
      GA_SCRIPTS="<script async src=\"https://www.googletagmanager.com/gtag/js?id=${REACT_APP_GA_TRACKING_ID}\"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','${REACT_APP_GA_TRACKING_ID}');</script>"
      
      # Simple replacement - no space before /> (React minifies it)
      sed -i "s@<meta name=\"ga-placeholder\" content=\"REPLACE_ME_AT_RUNTIME\"/>@${GA_SCRIPTS}@g" "$INDEX_HTML"
      
      echo "✅ Google Analytics tracking code injected into index.html"
    else
      echo "ℹ️  Google Analytics disabled (no tracking ID provided)"
      echo "ℹ️  This is expected for customer deployments"
      
      # Remove placeholder for clean HTML - no space before /> (React minifies it)
      sed -i "s@<meta name=\"ga-placeholder\" content=\"REPLACE_ME_AT_RUNTIME\"/>@@g" "$INDEX_HTML"
    fi

    # Check if Intercom is enabled
    if [ "$REACT_APP_ENABLE_INTERCOM" = "true" ] && [ -n "$REACT_APP_INTERCOM_APP_ID" ]; then
      echo "✅ Intercom enabled - App ID: $REACT_APP_INTERCOM_APP_ID"
      
      # Create Intercom widget script (from Intercom installation docs)
      INTERCOM_SCRIPT="<script>window.intercomSettings={api_base:'https://api-iam.intercom.io',app_id:'${REACT_APP_INTERCOM_APP_ID}'};(function(){var w=window;var ic=w.Intercom;if(typeof ic==='function'){ic('reattach_activator');ic('update',w.intercomSettings);}else{var d=document;var i=function(){i.c(arguments);};i.q=[];i.c=function(args){i.q.push(args);};w.Intercom=i;var l=function(){var s=d.createElement('script');s.type='text/javascript';s.async=true;s.src='https://widget.intercom.io/widget/${REACT_APP_INTERCOM_APP_ID}';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};if(document.readyState==='complete'){l();}else if(w.attachEvent){w.attachEvent('onload',l);}else{w.addEventListener('load',l,false);}}})();</script>"
      
      sed -i "s@<meta name=\"intercom-placeholder\" content=\"REPLACE_ME_AT_RUNTIME\"/>@${INTERCOM_SCRIPT}@g" "$INDEX_HTML"
      
      echo "✅ Intercom widget script injected into index.html"
    else
      echo "ℹ️  Intercom disabled"
      echo "ℹ️  This is expected for customer deployments"
      
      # Remove placeholder for clean HTML
      sed -i "s@<meta name=\"intercom-placeholder\" content=\"REPLACE_ME_AT_RUNTIME\"/>@@g" "$INDEX_HTML"
    fi

    echo "🚀 Starting nginx..."
    exec nginx -g 'daemon off;'
{{- end }}
