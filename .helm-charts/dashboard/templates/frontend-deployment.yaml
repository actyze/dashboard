{{- if .Values.services.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dashboard.fullname" . }}-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "dashboard.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dashboard.frontend.selectorLabels" . | nindent 8 }}
      annotations:
        # Force rolling restart when values change
        checksum/config: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        rollout/timestamp: {{ now | date "20060102150405" | quote }}
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        # Use custom entrypoint for runtime HTML injection (demo features)
        command: ["/scripts/docker-entrypoint.sh"]
        {{- $intercomEnabled := false }}
        {{- if .Values.frontend.intercom }}
          {{- $intercomEnabled = .Values.frontend.intercom.enabled }}
        {{- end }}
        {{- if or .Values.frontend.googleAnalytics.enabled $intercomEnabled }}
        env:
        {{- if .Values.frontend.googleAnalytics.enabled }}
        - name: REACT_APP_GA_TRACKING_ID
          value: {{ .Values.frontend.googleAnalytics.trackingId | quote }}
        {{- end }}
        {{- if $intercomEnabled }}
        - name: REACT_APP_ENABLE_INTERCOM
          value: "true"
        - name: REACT_APP_INTERCOM_APP_ID
          value: {{ .Values.frontend.intercom.appId | quote }}
        {{- end }}
        {{- end }}
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: entrypoint-script
          mountPath: /scripts
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
      volumes:
      - name: entrypoint-script
        configMap:
          name: {{ include "dashboard.fullname" . }}-frontend-entrypoint
          defaultMode: 0755
{{- end }}
