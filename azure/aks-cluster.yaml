# Azure AKS Cluster Configuration
apiVersion: containerservice.azure.com/v1
kind: ManagedCluster
metadata:
  name: dashboard-aks
  location: eastus
spec:
  resourceGroupName: dashboard-rg
  dnsPrefix: dashboard
  kubernetesVersion: "1.28"
  
  # Standard tier for production SLA
  sku:
    name: Standard
    tier: Standard
  
  # System node pool
  agentPoolProfiles:
  - name: system
    count: 1
    vmSize: Standard_D2s_v3
    osType: Linux
    mode: System
    enableAutoScaling: true
    minCount: 1
    maxCount: 3
    
  # ML workload node pool - upgraded for Qwen2.5-Coder
  - name: ml
    count: 2
    vmSize: Standard_D8s_v3  # Upgraded from D4s_v3 for better performance
    osType: Linux
    mode: User
    enableAutoScaling: true
    minCount: 1
    maxCount: 4
    nodeLabels:
      workload: ml-inference
      gpu: "false"
    nodeTaints:
    - key: ml-workload
      value: "true"
      effect: NoSchedule
      
  # Application node pool
  - name: apps
    count: 2
    vmSize: Standard_D2s_v3
    osType: Linux
    mode: User
    enableAutoScaling: true
    minCount: 2
    maxCount: 10
    
  # Networking
  networkProfile:
    networkPlugin: azure
    serviceCidr: 10.0.0.0/16
    dnsServiceIP: 10.0.0.10
    
  # Enable monitoring
  addonProfiles:
    omsAgent:
      enabled: true
      config:
        logAnalyticsWorkspaceResourceID: /subscriptions/{subscription-id}/resourceGroups/dashboard-rg/providers/Microsoft.OperationalInsights/workspaces/dashboard-logs
