spring.application.name=dashboard-backend
server.port=8080


# =============================
# Trino Connection Configuration
# =============================
# Used by TrinoQueryService for querying Trino
trino.url=jdbc:trino://b2b-trino-dev.dps.gw01.aks01.eus.nonprod.azure.intra.pepsico.com:443/catalog/schema?SSL=true&SSLVerification=NONE
trino.user=user
trino.password=

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:dashboarddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Log Configuration
logging.level.com.dashboard=INFO
logging.file.name=logs/dashboard-backend.log

# CORS configuration for /api/** endpoints
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.path-patterns=/api/**
