version: '3.8'

services:
  dashboard-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dashboard-network

  dashboard-fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.fastapi
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dashboard-network

  dashboard-frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - dashboard-backend
      - dashboard-fastapi
      - dashboard-schema-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dashboard-network

  dashboard-schema-service:
    build:
      context: ./models/schema-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - TRINO_HOST=localhost
      - TRINO_PORT=8080
      - TRINO_USER=admin
      - SCHEMA_REFRESH_HOURS=3
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8001
      - LOG_LEVEL=INFO
    volumes:
      - schema_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    networks:
      - dashboard-network
    restart: unless-stopped

volumes:
  schema_models:

networks:
  dashboard-network:
    driver: bridge
