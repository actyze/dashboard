server {
    listen 80;
    server_name localhost;

    # Serve robots.txt explicitly
    location = /robots.txt {
        root   /usr/share/nginx/html;
        add_header Content-Type text/plain always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # Allow large file uploads (default nginx limit is 1MB)
    client_max_body_size 100m;

    # Proxy API requests to Nexus backend
    # ONLY USED IN LOCAL DOCKER COMPOSE
    # In K8s: Ingress routes /api/* directly to Nexus service, this block is never called
    #
    # NOTE: Uses 'set' + 'resolver' to avoid DNS resolution errors in K8s
    # where 'nexus' hostname doesn't exist (it's 'dashboard-nexus')
    location /api/ {
        resolver 127.0.0.11 valid=30s;  # Docker's embedded DNS, fails gracefully if not available
        set $backend "nexus:8000";      # Docker Compose service name
        proxy_pass http://$backend;     # Forward full path including /api/
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for long-running queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Main application
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Security Headers - Prevent Indexing and Crawling
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        
        # Content Security Policy - Restrict resource loading
        # 'self' allows connections to the same origin (works with any domain)
        # Added Google Analytics and Intercom domains for demo site
        # Added blob: for Plotly chart downloads (PNG export)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://widget.intercom.io https://js.intercomcdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.google-analytics.com https://static.intercomcdn.com https://downloads.intercomcdn.com https://js.intercomcdn.com https://static.intercomassets.com; font-src 'self' data: https://fonts.intercomcdn.com; connect-src 'self' ws: wss: https://www.google-analytics.com https://analytics.google.com https://api-iam.intercom.io https://api-iam.eu.intercom.io https://api-iam.au.intercom.io wss://nexus-websocket-a.intercom.io wss://nexus-websocket-b.intercom.io; frame-src https://intercom-sheets.com; child-src https://intercom-sheets.com; media-src https://js.intercomcdn.com; frame-ancestors 'none';" always;
        
        # Cache control for HTML files
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
        
        # Security headers on error pages too
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}

