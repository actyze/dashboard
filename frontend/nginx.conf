server {
    listen 80;
    server_name localhost;

    # Serve robots.txt explicitly
    location = /robots.txt {
        root   /usr/share/nginx/html;
        add_header Content-Type text/plain always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # Main application
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Security Headers - Prevent Indexing and Crawling
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        
        # Content Security Policy - Restrict resource loading
        # 'self' allows connections to the same origin (works with any domain)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
        
        # Cache control for HTML files
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
        
        # Security headers on error pages too
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}

