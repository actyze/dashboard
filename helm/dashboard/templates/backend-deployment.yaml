{{- if .Values.components.backend }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dashboard.fullname" . }}-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "dashboard.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dashboard.backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: PHI_SQL_LORA_URL
          value: {{ .Values.backend.env.phiSqlLora.url }}
        - name: SCHEMA_SERVICE_URL
          value: {{ .Values.backend.env.schemaService.url }}
        - name: TRINO_URL
          value: {{ .Values.backend.env.trino.url }}
        - name: TRINO_USER
          value: {{ .Values.backend.env.trino.user }}
        livenessProbe:
          httpGet:
            path: /api/status
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/status
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
{{- end }}
