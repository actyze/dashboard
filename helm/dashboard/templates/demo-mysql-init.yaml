{{- if and .Values.components.demo.enabled .Values.components.demo.mysql }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.fullname" . }}-demo-mysql-init
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-mysql
data:
  01-create-tables.sql: |
    -- HR Management Demo Database
    CREATE DATABASE IF NOT EXISTS hrms;
    USE hrms;
    
    -- Departments table
    CREATE TABLE departments (
        department_id INT AUTO_INCREMENT PRIMARY KEY,
        department_name VARCHAR(100) NOT NULL,
        manager_id INT,
        location VARCHAR(100),
        budget DECIMAL(12,2),
        created_date DATE DEFAULT (CURRENT_DATE)
    );
    
    -- Employees table
    CREATE TABLE employees (
        employee_id INT AUTO_INCREMENT PRIMARY KEY,
        first_name VARCHAR(50) NOT NULL,
        last_name VARCHAR(50) NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        phone VARCHAR(20),
        hire_date DATE NOT NULL,
        job_title VARCHAR(100) NOT NULL,
        department_id INT,
        salary DECIMAL(10,2) NOT NULL,
        manager_id INT,
        status VARCHAR(20) DEFAULT 'Active',
        FOREIGN KEY (department_id) REFERENCES departments(department_id)
    );
    
    -- Projects table
    CREATE TABLE projects (
        project_id INT AUTO_INCREMENT PRIMARY KEY,
        project_name VARCHAR(200) NOT NULL,
        description TEXT,
        start_date DATE NOT NULL,
        end_date DATE,
        status VARCHAR(20) DEFAULT 'Planning',
        budget DECIMAL(12,2),
        department_id INT,
        project_manager_id INT,
        FOREIGN KEY (department_id) REFERENCES departments(department_id),
        FOREIGN KEY (project_manager_id) REFERENCES employees(employee_id)
    );
    
    -- Employee Projects (many-to-many)
    CREATE TABLE employee_projects (
        assignment_id INT AUTO_INCREMENT PRIMARY KEY,
        employee_id INT,
        project_id INT,
        role VARCHAR(100),
        allocation_percentage DECIMAL(5,2) DEFAULT 100.00,
        start_date DATE NOT NULL,
        end_date DATE,
        FOREIGN KEY (employee_id) REFERENCES employees(employee_id),
        FOREIGN KEY (project_id) REFERENCES projects(project_id)
    );
    
    -- Attendance table
    CREATE TABLE attendance (
        attendance_id INT AUTO_INCREMENT PRIMARY KEY,
        employee_id INT,
        date DATE NOT NULL,
        check_in_time TIME,
        check_out_time TIME,
        hours_worked DECIMAL(4,2),
        status VARCHAR(20) DEFAULT 'Present',
        FOREIGN KEY (employee_id) REFERENCES employees(employee_id)
    );
    
    -- Performance Reviews
    CREATE TABLE performance_reviews (
        review_id INT AUTO_INCREMENT PRIMARY KEY,
        employee_id INT,
        reviewer_id INT,
        review_period VARCHAR(20),
        review_date DATE NOT NULL,
        overall_rating DECIMAL(3,2),
        goals_achievement DECIMAL(3,2),
        technical_skills DECIMAL(3,2),
        communication DECIMAL(3,2),
        teamwork DECIMAL(3,2),
        comments TEXT,
        FOREIGN KEY (employee_id) REFERENCES employees(employee_id),
        FOREIGN KEY (reviewer_id) REFERENCES employees(employee_id)
    );

