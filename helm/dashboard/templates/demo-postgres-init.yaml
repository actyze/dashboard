{{- if and .Values.services.demo.enabled .Values.services.demo.postgres }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.fullname" . }}-demo-postgres-init
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-postgres
data:
  01-create-tables.sql: |
    -- E-commerce Demo Database
    CREATE SCHEMA IF NOT EXISTS ecommerce;
    
    -- Customers table
    CREATE TABLE ecommerce.customers (
        customer_id SERIAL PRIMARY KEY,
        first_name VARCHAR(50) NOT NULL,
        last_name VARCHAR(50) NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        phone VARCHAR(20),
        address TEXT,
        city VARCHAR(50),
        state VARCHAR(50),
        country VARCHAR(50),
        postal_code VARCHAR(20),
        registration_date DATE DEFAULT CURRENT_DATE,
        customer_segment VARCHAR(20) DEFAULT 'Regular'
    );
    
    -- Products table
    CREATE TABLE ecommerce.products (
        product_id SERIAL PRIMARY KEY,
        product_name VARCHAR(200) NOT NULL,
        category VARCHAR(50) NOT NULL,
        subcategory VARCHAR(50),
        brand VARCHAR(50),
        price DECIMAL(10,2) NOT NULL,
        cost DECIMAL(10,2) NOT NULL,
        stock_quantity INTEGER DEFAULT 0,
        description TEXT,
        created_date DATE DEFAULT CURRENT_DATE
    );
    
    -- Orders table
    CREATE TABLE ecommerce.orders (
        order_id SERIAL PRIMARY KEY,
        customer_id INTEGER REFERENCES ecommerce.customers(customer_id),
        order_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        status VARCHAR(20) DEFAULT 'Pending',
        total_amount DECIMAL(10,2) NOT NULL,
        shipping_cost DECIMAL(10,2) DEFAULT 0,
        tax_amount DECIMAL(10,2) DEFAULT 0,
        discount_amount DECIMAL(10,2) DEFAULT 0,
        payment_method VARCHAR(20),
        shipping_address TEXT
    );
    
    -- Order Items table
    CREATE TABLE ecommerce.order_items (
        order_item_id SERIAL PRIMARY KEY,
        order_id INTEGER REFERENCES ecommerce.orders(order_id),
        product_id INTEGER REFERENCES ecommerce.products(product_id),
        quantity INTEGER NOT NULL,
        unit_price DECIMAL(10,2) NOT NULL,
        total_price DECIMAL(10,2) NOT NULL
    );
    
    -- Sales Analytics Schema
    CREATE SCHEMA IF NOT EXISTS analytics;
    
    -- Monthly Sales Summary
    CREATE TABLE analytics.monthly_sales (
        year INTEGER,
        month INTEGER,
        total_orders INTEGER,
        total_revenue DECIMAL(12,2),
        total_customers INTEGER,
        avg_order_value DECIMAL(10,2),
        PRIMARY KEY (year, month)
    );
    
    -- Product Performance
    CREATE TABLE analytics.product_performance (
        product_id INTEGER,
        product_name VARCHAR(200),
        category VARCHAR(50),
        total_sold INTEGER,
        total_revenue DECIMAL(12,2),
        avg_rating DECIMAL(3,2),
        last_updated DATE DEFAULT CURRENT_DATE
    );

