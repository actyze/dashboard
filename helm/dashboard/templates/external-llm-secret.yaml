{{- if .Values.modelStrategy.externalLLM.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dashboard.fullname" . }}-external-llm
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.modelStrategy.externalLLM.apiKey }}
  external-llm-api-key: {{ .Values.modelStrategy.externalLLM.apiKey | b64enc }}
  {{- end }}
{{- end }}
