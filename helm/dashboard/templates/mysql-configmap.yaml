{{- if and .Values.components.demo.enabled .Values.components.demo.mysql }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.fullname" . }}-mysql-init
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: mysql
data:
  01-create-ecommerce-schema.sql: |
    -- Create ecommerce database schema for MySQL with sample data

    USE ecommerce;

    -- User accounts and authentication
    CREATE TABLE user_accounts (
        user_id INT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(50) UNIQUE NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        first_name VARCHAR(50) NOT NULL,
        last_name VARCHAR(50) NOT NULL,
        phone VARCHAR(20),
        date_of_birth DATE,
        account_status ENUM('Active', 'Suspended', 'Deleted') DEFAULT 'Active',
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        last_login TIMESTAMP NULL,
        email_verified BOOLEAN DEFAULT FALSE,
        phone_verified BOOLEAN DEFAULT FALSE
    );

    -- User profiles and preferences
    CREATE TABLE user_profiles (
        profile_id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT UNIQUE NOT NULL,
        avatar_url VARCHAR(500),
        bio TEXT,
        preferred_language VARCHAR(10) DEFAULT 'en',
        timezone VARCHAR(50) DEFAULT 'UTC',
        newsletter_subscribed BOOLEAN DEFAULT TRUE,
        marketing_emails BOOLEAN DEFAULT FALSE,
        sms_notifications BOOLEAN DEFAULT FALSE,
        privacy_level ENUM('Public', 'Friends', 'Private') DEFAULT 'Private',
        FOREIGN KEY (user_id) REFERENCES user_accounts(user_id) ON DELETE CASCADE
    );

    -- Shipping addresses
    CREATE TABLE shipping_addresses (
        address_id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT NOT NULL,
        address_type ENUM('Home', 'Work', 'Other') DEFAULT 'Home',
        recipient_name VARCHAR(100) NOT NULL,
        street_address VARCHAR(200) NOT NULL,
        apartment_unit VARCHAR(50),
        city VARCHAR(100) NOT NULL,
        state_province VARCHAR(100) NOT NULL,
        postal_code VARCHAR(20) NOT NULL,
        country VARCHAR(100) NOT NULL DEFAULT 'United States',
        is_default BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (user_id) REFERENCES user_accounts(user_id) ON DELETE CASCADE
    );

    -- Shopping cart
    CREATE TABLE shopping_cart (
        cart_id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT NOT NULL,
        product_id INT NOT NULL,
        quantity INT NOT NULL DEFAULT 1,
        unit_price DECIMAL(10,2) NOT NULL,
        added_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        saved_for_later BOOLEAN DEFAULT FALSE,
        FOREIGN KEY (user_id) REFERENCES user_accounts(user_id) ON DELETE CASCADE,
        UNIQUE KEY unique_user_product (user_id, product_id)
    );

    -- Product categories
    CREATE TABLE product_categories (
        category_id INT AUTO_INCREMENT PRIMARY KEY,
        category_name VARCHAR(100) NOT NULL UNIQUE,
        parent_category_id INT NULL,
        category_description TEXT,
        category_image_url VARCHAR(500),
        is_active BOOLEAN DEFAULT TRUE,
        sort_order INT DEFAULT 0,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (parent_category_id) REFERENCES product_categories(category_id)
    );

    -- Product catalog
    CREATE TABLE ecommerce_products (
        product_id INT AUTO_INCREMENT PRIMARY KEY,
        product_sku VARCHAR(50) UNIQUE NOT NULL,
        product_name VARCHAR(200) NOT NULL,
        category_id INT NOT NULL,
        brand VARCHAR(100),
        short_description TEXT,
        long_description TEXT,
        price DECIMAL(10,2) NOT NULL,
        sale_price DECIMAL(10,2) NULL,
        cost DECIMAL(10,2) NOT NULL,
        weight DECIMAL(8,3),
        dimensions VARCHAR(100),
        color VARCHAR(50),
        size VARCHAR(50),
        material VARCHAR(100),
        stock_quantity INT DEFAULT 0,
        low_stock_threshold INT DEFAULT 10,
        is_active BOOLEAN DEFAULT TRUE,
        is_featured BOOLEAN DEFAULT FALSE,
        rating_average DECIMAL(3,2) DEFAULT 0.00,
        rating_count INT DEFAULT 0,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (category_id) REFERENCES product_categories(category_id)
    );

    -- Product reviews and ratings
    CREATE TABLE product_reviews (
        review_id INT AUTO_INCREMENT PRIMARY KEY,
        product_id INT NOT NULL,
        user_id INT NOT NULL,
        rating INT NOT NULL CHECK (rating >= 1 AND rating <= 5),
        review_title VARCHAR(200),
        review_text TEXT,
        is_verified_purchase BOOLEAN DEFAULT FALSE,
        helpful_votes INT DEFAULT 0,
        total_votes INT DEFAULT 0,
        review_status ENUM('Pending', 'Approved', 'Rejected') DEFAULT 'Pending',
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (product_id) REFERENCES ecommerce_products(product_id) ON DELETE CASCADE,
        FOREIGN KEY (user_id) REFERENCES user_accounts(user_id) ON DELETE CASCADE,
        UNIQUE KEY unique_user_product_review (user_id, product_id)
    );

    -- Wishlists
    CREATE TABLE wishlists (
        wishlist_id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT NOT NULL,
        wishlist_name VARCHAR(100) NOT NULL DEFAULT 'My Wishlist',
        is_public BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (user_id) REFERENCES user_accounts(user_id) ON DELETE CASCADE
    );

    CREATE TABLE wishlist_items (
        wishlist_item_id INT AUTO_INCREMENT PRIMARY KEY,
        wishlist_id INT NOT NULL,
        product_id INT NOT NULL,
        added_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        priority ENUM('High', 'Medium', 'Low') DEFAULT 'Medium',
        notes TEXT,
        FOREIGN KEY (wishlist_id) REFERENCES wishlists(wishlist_id) ON DELETE CASCADE,
        FOREIGN KEY (product_id) REFERENCES ecommerce_products(product_id) ON DELETE CASCADE,
        UNIQUE KEY unique_wishlist_product (wishlist_id, product_id)
    );

    -- Customer support tickets
    CREATE TABLE support_tickets (
        ticket_id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT NOT NULL,
        ticket_number VARCHAR(20) UNIQUE NOT NULL,
        subject VARCHAR(200) NOT NULL,
        description TEXT NOT NULL,
        priority ENUM('Low', 'Medium', 'High', 'Urgent') DEFAULT 'Medium',
        status ENUM('Open', 'In Progress', 'Waiting for Customer', 'Resolved', 'Closed') DEFAULT 'Open',
        category ENUM('Order Issue', 'Product Question', 'Technical Support', 'Billing', 'Returns', 'Other') NOT NULL,
        assigned_agent_id INT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        resolved_at TIMESTAMP NULL,
        FOREIGN KEY (user_id) REFERENCES user_accounts(user_id) ON DELETE CASCADE
    );

