apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.fullname" . }}-postgres-init
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  01-nexus-schema.sql: |
{{ .Files.Get "sql/nexus-schema.sql" | indent 4 }}
  
  02-demo-schema.sql: |
{{ .Files.Get "sql/demo-schema.sql" | indent 4 }}
  
  03-demo-data.sql: |
{{ .Files.Get "sql/demo-data.sql" | indent 4 }}
