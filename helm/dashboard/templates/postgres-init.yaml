{{- if and .Values.services.trino.enabled .Values.services.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.fullname" . }}-postgres-init
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  01-create-tables.sql: |
    -- Dashboard Operational Database
    -- User preferences, settings, and sample e-commerce data for testing
    
    -- Dashboard operational schemas
    CREATE SCHEMA IF NOT EXISTS dashboard;
    CREATE SCHEMA IF NOT EXISTS ecommerce;
    CREATE SCHEMA IF NOT EXISTS hrms;
    
    -- User management tables
    CREATE TABLE dashboard.users (
        user_id SERIAL PRIMARY KEY,
        username VARCHAR(50) UNIQUE NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        full_name VARCHAR(100),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        is_active BOOLEAN DEFAULT true
    );
    
    -- User preferences table
    CREATE TABLE dashboard.user_preferences (
        preference_id SERIAL PRIMARY KEY,
        user_id INTEGER REFERENCES dashboard.users(user_id) ON DELETE CASCADE,
        preference_key VARCHAR(100) NOT NULL,
        preference_value TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(user_id, preference_key)
    );
    
    -- Dashboard settings table
    CREATE TABLE dashboard.settings (
        setting_id SERIAL PRIMARY KEY,
        setting_key VARCHAR(100) UNIQUE NOT NULL,
        setting_value TEXT,
        description TEXT,
        setting_type VARCHAR(20) DEFAULT 'string', -- string, number, boolean, json
        is_public BOOLEAN DEFAULT false,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Query history table
    CREATE TABLE dashboard.query_history (
        query_id SERIAL PRIMARY KEY,
        user_id INTEGER REFERENCES dashboard.users(user_id) ON DELETE CASCADE,
        natural_language_query TEXT NOT NULL,
        generated_sql TEXT,
        execution_time_ms INTEGER,
        result_count INTEGER,
        status VARCHAR(20) DEFAULT 'success', -- success, error, timeout
        error_message TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Sample e-commerce data for testing and demos
    
    -- Customers table
    CREATE TABLE ecommerce.customers (
        customer_id SERIAL PRIMARY KEY,
        first_name VARCHAR(50) NOT NULL,
        last_name VARCHAR(50) NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        phone VARCHAR(20),
        address TEXT,
        city VARCHAR(50),
        state VARCHAR(50),
        country VARCHAR(50),
        postal_code VARCHAR(20),
        registration_date DATE DEFAULT CURRENT_DATE,
        customer_segment VARCHAR(20) DEFAULT 'Regular'
    );
    
    -- Products table
    CREATE TABLE ecommerce.products (
        product_id SERIAL PRIMARY KEY,
        product_name VARCHAR(200) NOT NULL,
        category VARCHAR(50) NOT NULL,
        subcategory VARCHAR(50),
        brand VARCHAR(50),
        price DECIMAL(10,2) NOT NULL,
        cost DECIMAL(10,2) NOT NULL,
        stock_quantity INTEGER DEFAULT 0,
        description TEXT,
        created_date DATE DEFAULT CURRENT_DATE
    );
    
    -- Orders table
    CREATE TABLE ecommerce.orders (
        order_id SERIAL PRIMARY KEY,
        customer_id INTEGER REFERENCES ecommerce.customers(customer_id),
        order_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        status VARCHAR(20) DEFAULT 'Pending',
        total_amount DECIMAL(10,2) NOT NULL,
        shipping_cost DECIMAL(10,2) DEFAULT 0,
        tax_amount DECIMAL(10,2) DEFAULT 0,
        discount_amount DECIMAL(10,2) DEFAULT 0,
        payment_method VARCHAR(20),
        shipping_address TEXT
    );
    
    -- Order Items table
    CREATE TABLE ecommerce.order_items (
        order_item_id SERIAL PRIMARY KEY,
        order_id INTEGER REFERENCES ecommerce.orders(order_id),
        product_id INTEGER REFERENCES ecommerce.products(product_id),
        quantity INTEGER NOT NULL,
        unit_price DECIMAL(10,2) NOT NULL,
        total_price DECIMAL(10,2) NOT NULL
    );
    
    -- Sales Analytics Schema
    CREATE SCHEMA IF NOT EXISTS analytics;
    
    -- Monthly Sales Summary
    CREATE TABLE analytics.monthly_sales (
        year INTEGER,
        month INTEGER,
        total_orders INTEGER,
        total_revenue DECIMAL(12,2),
        total_customers INTEGER,
        avg_order_value DECIMAL(10,2),
        PRIMARY KEY (year, month)
    );
    
    -- Product Performance
    CREATE TABLE analytics.product_performance (
        product_id INTEGER,
        product_name VARCHAR(200),
        category VARCHAR(50),
        total_sold INTEGER,
        total_revenue DECIMAL(12,2),
        avg_rating DECIMAL(3,2),
        last_updated DATE DEFAULT CURRENT_DATE
    );
    
    -- HRMS (Human Resources Management System) Tables
    
    -- Departments table
    CREATE TABLE hrms.departments (
        department_id SERIAL PRIMARY KEY,
        department_name VARCHAR(100) NOT NULL,
        manager_id INTEGER,
        location VARCHAR(100),
        budget DECIMAL(12,2),
        created_date DATE DEFAULT CURRENT_DATE
    );
    
    -- Employees table
    CREATE TABLE hrms.employees (
        employee_id SERIAL PRIMARY KEY,
        first_name VARCHAR(50) NOT NULL,
        last_name VARCHAR(50) NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        phone VARCHAR(20),
        hire_date DATE NOT NULL,
        job_title VARCHAR(100) NOT NULL,
        department_id INTEGER REFERENCES hrms.departments(department_id),
        salary DECIMAL(10,2) NOT NULL,
        manager_id INTEGER,
        status VARCHAR(20) DEFAULT 'Active'
    );
    
    -- Projects table
    CREATE TABLE hrms.projects (
        project_id SERIAL PRIMARY KEY,
        project_name VARCHAR(200) NOT NULL,
        description TEXT,
        start_date DATE NOT NULL,
        end_date DATE,
        status VARCHAR(20) DEFAULT 'Planning',
        budget DECIMAL(12,2),
        department_id INTEGER REFERENCES hrms.departments(department_id),
        project_manager_id INTEGER REFERENCES hrms.employees(employee_id)
    );
    
    -- Employee Project Assignments
    CREATE TABLE hrms.employee_projects (
        assignment_id SERIAL PRIMARY KEY,
        employee_id INTEGER REFERENCES hrms.employees(employee_id),
        project_id INTEGER REFERENCES hrms.projects(project_id),
        role VARCHAR(100),
        allocation_percentage DECIMAL(5,2),
        start_date DATE,
        end_date DATE
    );
    
    -- Attendance tracking
    CREATE TABLE hrms.attendance (
        attendance_id SERIAL PRIMARY KEY,
        employee_id INTEGER REFERENCES hrms.employees(employee_id),
        date DATE NOT NULL,
        check_in_time TIME,
        check_out_time TIME,
        hours_worked DECIMAL(4,2),
        status VARCHAR(20) DEFAULT 'Present'
    );
    
    -- Performance Reviews
    CREATE TABLE hrms.performance_reviews (
        review_id SERIAL PRIMARY KEY,
        employee_id INTEGER REFERENCES hrms.employees(employee_id),
        reviewer_id INTEGER REFERENCES hrms.employees(employee_id),
        review_period VARCHAR(50),
        review_date DATE,
        overall_rating DECIMAL(3,2),
        goals_achievement DECIMAL(3,2),
        technical_skills DECIMAL(3,2),
        communication DECIMAL(3,2),
        teamwork DECIMAL(3,2),
        comments TEXT
    );

