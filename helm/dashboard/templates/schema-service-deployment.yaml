{{- if .Values.components.schemaService }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dashboard.fullname" . }}-schema-service
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema-service
spec:
  replicas: {{ .Values.schemaService.replicaCount }}
  selector:
    matchLabels:
      {{- include "dashboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: schema-service
  template:
    metadata:
      labels:
        {{- include "dashboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: schema-service
    spec:
      containers:
      - name: schema-service
        image: "{{ .Values.schemaService.image.repository }}:{{ .Values.schemaService.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        env:
        - name: TRINO_HOST
          value: "{{ .Values.schemaService.env.trino.host }}"
        - name: TRINO_PORT
          value: "{{ .Values.schemaService.env.trino.port }}"
        - name: TRINO_USER
          value: "{{ .Values.schemaService.env.trino.user }}"
        - name: SCHEMA_REFRESH_HOURS
          value: "{{ .Values.schemaService.env.refreshHours }}"
        - name: SERVICE_HOST
          value: "0.0.0.0"
        - name: SERVICE_PORT
          value: "8001"
        - name: LOG_LEVEL
          value: "INFO"
        ports:
        - containerPort: 8001
          name: http
        volumeMounts:
        {{- if .Values.schemaService.storage.enabled }}
        - name: model-cache
          mountPath: /app/model_cache
        {{- end }}
        resources:
          {{- toYaml .Values.schemaService.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 10
      volumes:
      {{- if .Values.schemaService.storage.enabled }}
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ include "dashboard.fullname" . }}-schema-service-pvc
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dashboard.fullname" . }}-schema-service
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema-service
spec:
  type: {{ .Values.schemaService.service.type }}
  ports:
  - port: {{ .Values.schemaService.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: schema-service
{{- if .Values.schemaService.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dashboard.fullname" . }}-schema-service-pvc
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.schemaService.storage.size }}
  {{- if .Values.schemaService.storage.storageClass }}
  storageClassName: {{ .Values.schemaService.storage.storageClass }}
  {{- end }}
{{- end }}
{{- end }}
