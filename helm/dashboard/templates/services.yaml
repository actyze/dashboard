{{- if .Values.backend.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dashboard.fullname" . }}-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dashboard.backend.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if .Values.fastapi.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dashboard.fullname" . }}-fastapi
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.fastapi.labels" . | nindent 4 }}
spec:
  type: {{ .Values.fastapi.service.type }}
  ports:
    - port: {{ .Values.fastapi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 8080
      targetPort: trino
      protocol: TCP
      name: trino
  selector:
    {{- include "dashboard.fastapi.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if .Values.frontend.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dashboard.fullname" . }}-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dashboard.frontend.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if .Values.trino.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dashboard.trino.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.trino.labels" . | nindent 4 }}
spec:
  type: {{ .Values.trino.service.type }}
  ports:
    - port: {{ .Values.trino.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dashboard.trino.selectorLabels" . | nindent 4 }}
{{- end }}
