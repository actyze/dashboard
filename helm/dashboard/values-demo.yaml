# Demo values file - Complete setup with sample data and multiple databases
# Usage: helm install dashboard helm/dashboard --values helm/dashboard/values-demo.yaml

global:
  namespace: dashboard
  imagePullPolicy: Always

backend:
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

fastapi:
  replicaCount: 1
  resources:
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  storage:
    storageClass: "standard"
  livenessProbe:
    initialDelaySeconds: 300
    periodSeconds: 60
    timeoutSeconds: 30
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 10

frontend:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Trino with enhanced catalogs for demo
trino:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  environment: "demo"
  jvm:
    maxHeapSize: "1G"
  config:
    enabled: true
  catalogs:
    memory:
      connector.name: "memory"
    tpch:
      connector.name: "tpch"
      tpch.splits-per-node: "4"
    tpcds:
      connector.name: "tpcds"
      tpcds.splits-per-node: "4"

# Demo databases with rich sample data
demo:
  enabled: true
  postgres:
    enabled: true
    database: "ecommerce_demo"
    user: "demo_user"
    password: "demo_password"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
  mysql:
    enabled: true
    database: "hrms"
    user: "demo_user"
    password: "demo_password"
    rootPassword: "root_password"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

ingress:
  enabled: true
  hosts:
    - host: dashboard.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend

autoscaling:
  backend:
    enabled: false
  frontend:
    enabled: false
  fastapi:
    enabled: false

podDisruptionBudget:
  enabled: false
