# Development Environment Configuration
# This file contains settings for local Kind cluster deployment

# Environment identifier
environment: dev

# Global configuration
global:
  namespace: dashboard
  imagePullPolicy: IfNotPresent
  storageClass: "standard"

# ============================================================================
# MODEL STRATEGY - Choose ONE approach for SQL generation
# ============================================================================
modelStrategy:
  # Option 1: External LLM APIs (Recommended for dev/testing)
  externalLLM:
    enabled: true              # ← Toggle: Use external LLM (OpenAI, Perplexity, Claude, etc.)
    provider: "perplexity"     # Options: openai, perplexity, anthropic, groq, together
    model: "sonar-reasoning-pro"
    baseUrl: "https://api.perplexity.ai"
    apiKey: "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"  # Should be from secret in production
    maxTokens: 1000
    temperature: 0.1
    timeout: 30s
    fallbackToLocal: false     # Don't fallback to local model if external fails
    
  # Option 2: Local Phi-4 LoRA Model (Self-hosted, resource intensive)
  phiSqlLora:
    enabled: false             # ← Toggle: Use local Phi-4-mini LoRA model
    replicas: 1
    resources:
      requests:
        memory: "4Gi"
        cpu: "1000m"
      limits:
        memory: "8Gi"
        cpu: "2000m"

# Service Account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# ============================================================================
# SERVICES - Enable/disable individual components
# ============================================================================
services:
  # Core Services (required)
  backend:
    enabled: true        # ← Spring Boot orchestration service (REQUIRED)
  
  # Optional Services
  frontend:
    enabled: true        # ← React UI (can disable for API-only testing)
  schemaService:
    enabled: true        # ← FAISS-based schema recommendations (enhances SQL quality)
  trino:
    enabled: true        # ← Query execution engine (required for actual query execution)
  
  # Demo Data (for development/testing)
  demo:
    enabled: true        # ← Demo databases with sample data
    postgres: true       # ← PostgreSQL with e-commerce data
    mysql: true          # ← MySQL with HRMS data

# Backend Spring Boot service
backend:
  replicaCount: 1
  image:
    repository: dashboard-backend
    tag: v8
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  env:
    phiSqlLora:
      url: "http://dashboard-phi-sql-lora:8000"
    schemaService:
      url: "http://dashboard-schema-service:8001"
    trino:
      url: "jdbc:trino://dashboard-trino:8080/memory/default"
      user: "admin"

# Frontend React service
frontend:
  replicaCount: 1
  image:
    repository: dashboard-frontend
    tag: latest
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: dashboard.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls: []

# Service Monitor for Prometheus (optional)
serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s

# Horizontal Pod Autoscaler
autoscaling:
  backend:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  frontend:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  fastapi:
    enabled: false  # ML service typically doesn't need autoscaling

# Network Policies
networkPolicy:
  enabled: false

# Pod Disruption Budgets
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Trino database service
trino:
  replicaCount: 1
  image:
    repository: trinodb/trino
    tag: "477"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  environment: "production"
  nodeId: "ffffffff-ffff-ffff-ffff-ffffffffffff"
  jvm:
    maxHeapSize: "2G"
  config:
    enabled: true
  catalogs:
    memory:
      connector.name: "memory"
    tpch:
      connector.name: "tpch"
      tpch.splits-per-node: "4"
    postgresql:
      connector.name: "postgresql"
      connection-url: "jdbc:postgresql://dashboard-postgres:5432/sampledb"
      connection-user: "postgres"
      connection-password: "postgres"
    mysql:
      connector.name: "mysql"
      connection-url: "jdbc:mysql://dashboard-mysql:3306/ecommerce"
      connection-user: "mysql"
      connection-password: "mysql"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Demo mode configuration (optional)
demo:
  postgres:
    image:
      repository: postgres
      tag: "15-alpine"
    database: "ecommerce_demo"
    user: "demo_user"
    password: "demo_password"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
  mysql:
    image:
      repository: mysql
      tag: "8.0"
    database: "hrms"
    user: "demo_user"
    password: "demo_password"
    rootPassword: "root_password"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

# FAISS Schema Service
schemaService:
  replicaCount: 1
  image:
    repository: dashboard-schema-service
    tag: latest
  resources:
    requests:
      memory: "768Mi"
      cpu: "250m"
    limits:
      memory: "1.5Gi"
      cpu: "500m"
  env:
    trino:
      host: "dashboard-trino"
      port: 8080
      user: "admin"
    refreshHours: 3
  service:
    type: ClusterIP
    port: 8001
  storage:
    enabled: true
    size: 2Gi
    storageClass: "standard"


# Phi SQL LoRA Service (CPU INT8 Quantized) - Optional
phiSqlLora:
  enabled: false  # Set to true to deploy local Phi-4 model
  replicaCount: 1
  image:
    repository: phi-sql-lora-optimized
    tag: frontend
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    name: http
  resources:
    requests:
      memory: "8Gi"
      cpu: "4"
    limits:
      memory: "24Gi"
      cpu: "10"
  env:
    PYTHONUNBUFFERED: "1"
    TRANSFORMERS_CACHE: "/app/model_cache"
    HF_HOME: "/app/model_cache"
    TOKENIZERS_PARALLELISM: "false"
  persistence:
    enabled: true
    storageClass: "standard"
    accessMode: ReadWriteOnce
    size: 50Gi
    mountPath: /app/model_cache
  healthCheck:
    enabled: true
    path: /health
    port: 8000
    initialDelaySeconds: 300  # 5 minutes for model loading
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    enabled: true
    path: /health
    port: 8000
    initialDelaySeconds: 300  # 5 minutes for model loading
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  model:
    name: "phi-4-mini-trino-lora-cpu-int8"
    maxTokens: 1000
    temperature: 0.1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  securityContext:
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
      add:
      - NET_BIND_SERVICE

# Logging configuration
logging:
  level:
    dashboard: INFO
    root: INFO
  files:
    application:
      path: "/app/logs/dashboard-backend.log"

# Monitoring configuration
monitoring:
  metrics:
    enabled: true

# ============================================================================
# NOTE: Model strategy is configured at the top in the modelStrategy section
# ============================================================================
