# Values for local Kind cluster deployment
global:
  namespace: dashboard
  imagePullPolicy: IfNotPresent
  storageClass: "standard"

# Component enablement flags
components:
  backend: true
  frontend: true
  fastapi: false  # ML service - disabled for local
  trino: true
  schemaService: true   # Enable schema service
  mcpTrino: false  # MCP servers - disabled for local
  mcpChart: false
  demo:
    enabled: true  # Demo mode with sample data
    postgres: true
    mysql: true

# Override for Trino to use Always pull policy
trino:
  imagePullPolicy: Always

backend:
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  config:
    rateLimit:
      maxRequestsPerMinute: 60
      maxRequestsPerHour: 1000
      cleanupIntervalMinutes: 5
    audit:
      slowQueryThresholdMs: 10000
      maxQueryLogLength: 1000
      maxArgumentsLogLength: 500
      enableMetrics: true
    mcp:
      trino:
        server:
          enabled: true
          transport: "http"
          host: "0.0.0.0"
          port: 8081
          threadPoolSize: 10
          requestTimeoutMs: 30000
        connection:
          url: "jdbc:trino://dashboard-trino:8080/memory"
          user: "admin"
          password: ""
          catalog: "memory"
          schema: "default"
          maxRows: 10000
          queryTimeoutSeconds: 300
        connectionPool:
          minimumIdle: 2
          maximumPoolSize: 10
          connectionTimeoutMs: 30000
          idleTimeoutMs: 600000
          maxLifetimeMs: 1800000
          leakDetectionThresholdMs: 60000
        security:
          readOnlyMode: true
          allowDdl: false
          allowDml: false
          allowedCatalogs:
            - "memory"
            - "tpch"
          blockedKeywords:
            - "DROP"
            - "DELETE"
            - "UPDATE"
            - "INSERT"
          maxQueryLength: 50000
          enableSqlInjectionDetection: true

fastapi:
  replicaCount: 1
  resources:
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  storage:
    storageClass: "standard"
  livenessProbe:
    initialDelaySeconds: 300
    periodSeconds: 60
    timeoutSeconds: 30
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 10

frontend:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

ingress:
  enabled: true
  hosts:
    - host: dashboard.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend

autoscaling:
  backend:
    enabled: false
  frontend:
    enabled: false
  fastapi:
    enabled: false

# Trino database service (basic version without gateway)
trino:
  replicaCount: 1
  image:
    repository: trinodb/trino
    tag: "435"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "500m"
  environment: "development"
  nodeId: "ffffffff-ffff-ffff-ffff-ffffffffffff"
  jvm:
    maxHeapSize: "1536m"
  config:
    enabled: true
  catalogs:
    memory:
      connector.name: "memory"
    tpch:
      connector.name: "tpch"
      tpch.splits-per-node: "4"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Demo mode configuration (enabled for local testing)
demo:
  postgres:
    imagePullPolicy: Always
    database: "ecommerce_demo"
    user: "demo_user"
    password: "demo_password"
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  mysql:
    imagePullPolicy: Always
    database: "hrms"
    user: "demo_user"
    password: "demo_password"
    rootPassword: "root_password"
    resources:
      requests:
        memory: "512Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "250m"

podDisruptionBudget:
  enabled: false

# Logging configuration
logging:
  level:
    dashboard: INFO
    audit: INFO
  files:
    application:
      path: "/app/logs/dashboard-backend.log"

# Monitoring configuration
monitoring:
  metrics:
    enabled: false
