# Values for local Kind cluster deployment
global:
  namespace: dashboard
  imagePullPolicy: Never

# Override for Trino to use Always pull policy
trino:
  imagePullPolicy: Always

backend:
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

fastapi:
  replicaCount: 1
  resources:
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "2000m"
  storage:
    storageClass: "standard"
  livenessProbe:
    initialDelaySeconds: 300
    periodSeconds: 60
    timeoutSeconds: 30
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 10

frontend:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

ingress:
  enabled: true
  hosts:
    - host: dashboard.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend

autoscaling:
  backend:
    enabled: false
  frontend:
    enabled: false
  fastapi:
    enabled: false

# Trino database service (basic version without gateway)
trino:
  enabled: true
  replicaCount: 1
  image:
    repository: trinodb/trino
    tag: "435"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  environment: "development"
  nodeId: "ffffffff-ffff-ffff-ffff-ffffffffffff"
  jvm:
    maxHeapSize: "1G"
  config:
    enabled: true
  catalogs:
    memory:
      connector.name: "memory"
    tpch:
      connector.name: "tpch"
      tpch.splits-per-node: "4"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Demo mode configuration (enabled for local testing)
demo:
  enabled: true  # Enable demo databases and sample data for local development
  postgres:
    enabled: true
    imagePullPolicy: Always
    database: "ecommerce_demo"
    user: "demo_user"
    password: "demo_password"
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  mysql:
    enabled: true
    imagePullPolicy: Always
    database: "hrms"
    user: "demo_user"
    password: "demo_password"
    rootPassword: "root_password"
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"

podDisruptionBudget:
  enabled: false
