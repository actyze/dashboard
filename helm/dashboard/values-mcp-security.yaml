# Helm Values for Dashboard MCP Security Configuration
# This file contains all externalized configurations for the Java MCP server

# Global settings
global:
  environment: production
  region: us-west-2

# Component enablement flags
components:
  backend: true
  frontend: true
  fastapi: true   # ML service - enabled for MCP security
  trino: true
  schemaService: true
  mcpTrino: true  # MCP servers - enabled for security testing
  mcpChart: true
  demo:
    enabled: false  # Demo mode - disabled for security
    postgres: false
    mysql: false

# Dashboard Backend Configuration
backend:
  image:
    repository: dashboard-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  
  replicas: 2
  
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  
  # Environment-specific configurations
  config:
    # Rate Limiting Configuration
    rateLimit:
      maxRequestsPerMinute: 60
      maxRequestsPerHour: 1000
      cleanupIntervalMinutes: 5
    
    # Audit Logging Configuration
    audit:
      slowQueryThresholdMs: 10000
      maxQueryLogLength: 1000
      maxArgumentsLogLength: 500
      enableMetrics: true
    
    # Chart MCP Client Configuration
    chart:
      server:
        url: "http://dashboard-mcp-chart:3000"
        timeoutMs: 30000
        maxDataPoints: 10000
        enableFallback: true
    
    # Chart Cache Configuration
    cache:
      chart:
        enabled: true
        ttlMinutes: 60
        maxSize: 1000
        cleanupIntervalMinutes: 15
    
    # MCP Server Configuration
    mcp:
      trino:
        # Server Configuration
        server:
          enabled: true
          transport: "http"  # http or stdio
          host: "0.0.0.0"
          port: 8081
          threadPoolSize: 10
          requestTimeoutMs: 30000
        
        # Trino Connection Configuration
        connection:
          url: "jdbc:trino://trino-coordinator:8080/memory"
          user: "admin"
          password: ""
          catalog: "memory"
          schema: "default"
          maxRows: 10000
          queryTimeoutSeconds: 300
        
        # Connection Pool Configuration
        connectionPool:
          minimumIdle: 2
          maximumPoolSize: 10
          connectionTimeoutMs: 30000
          idleTimeoutMs: 600000
          maxLifetimeMs: 1800000
          leakDetectionThresholdMs: 60000
        
        # Security Configuration
        security:
          readOnlyMode: true
          allowDdl: false
          allowDml: false
          allowedCatalogs:
            - "memory"
            - "system"
            - "tpch"
          blockedKeywords:
            - "DROP"
            - "DELETE"
            - "UPDATE"
            - "INSERT"
            - "CREATE"
            - "ALTER"
            - "TRUNCATE"
            - "MERGE"
            - "CALL"
            - "EXECUTE"
          maxQueryLength: 50000
          enableSqlInjectionDetection: true

# Environment-specific overrides
environments:
  development:
    backend:
      replicas: 1
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
        limits:
          memory: "1Gi"
          cpu: "500m"
      config:
        rateLimit:
          maxRequestsPerMinute: 120
          maxRequestsPerHour: 2000
        audit:
          slowQueryThresholdMs: 5000
          enableMetrics: true
        mcp:
          trino:
            connection:
              url: "jdbc:trino://localhost:8080/memory"
              maxRows: 1000
            connectionPool:
              maximumPoolSize: 5
            security:
              allowedCatalogs:
                - "memory"
                - "system"
  
  staging:
    backend:
      replicas: 2
      config:
        rateLimit:
          maxRequestsPerMinute: 80
          maxRequestsPerHour: 1500
        mcp:
          trino:
            connection:
              url: "jdbc:trino://trino-staging:8080/memory"
              maxRows: 5000
            security:
              allowedCatalogs:
                - "memory"
                - "system"
                - "staging_data"
  
  production:
    backend:
      replicas: 3
      resources:
        requests:
          memory: "2Gi"
          cpu: "1000m"
        limits:
          memory: "4Gi"
          cpu: "2000m"
      config:
        rateLimit:
          maxRequestsPerMinute: 60
          maxRequestsPerHour: 1000
        audit:
          slowQueryThresholdMs: 15000
          maxQueryLogLength: 2000
          enableMetrics: true
        mcp:
          trino:
            connection:
              url: "jdbc:trino://trino-production:8080/catalog"
              maxRows: 10000
              queryTimeoutSeconds: 600
            connectionPool:
              minimumIdle: 5
              maximumPoolSize: 20
              connectionTimeoutMs: 60000
            security:
              allowedCatalogs:
                - "production_data"
                - "analytics"
                - "reporting"
              maxQueryLength: 100000

# Logging Configuration
logging:
  level:
    root: "INFO"
    dashboard: "INFO"
    audit: "INFO"
  
  # Log file configurations
  files:
    application:
      enabled: true
      path: "/app/logs/dashboard-backend.log"
      maxSize: "100MB"
      maxHistory: 30
    
    audit:
      enabled: true
      path: "/app/logs/audit.log"
      maxSize: "100MB"
      maxHistory: 90
    
    security:
      enabled: true
      path: "/app/logs/security-audit.log"
      maxSize: "50MB"
      maxHistory: 365

# Kubernetes-specific configurations
kubernetes:
  service:
    type: ClusterIP
    port: 8080
    mcpPort: 8081
  
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/rate-limit: "100"
      nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    hosts:
      - host: dashboard-api.example.com
        paths:
          - path: /
            pathType: Prefix
  
  # Persistent Volume for logs
  persistence:
    enabled: true
    storageClass: "standard"
    size: "10Gi"
    mountPath: "/app/logs"
  
  # Security Context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  
  # Health Checks
  healthCheck:
    enabled: true
    livenessProbe:
      httpGet:
        path: /actuator/health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /actuator/ready
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5

# Monitoring and Observability
monitoring:
  metrics:
    enabled: true
    port: 9090
    path: "/actuator/prometheus"
  
  alerts:
    enabled: true
    rules:
      - name: "high-rate-limit-violations"
        threshold: 10
        duration: "5m"
      - name: "slow-queries"
        threshold: 30000  # 30 seconds
        duration: "1m"
      - name: "security-violations"
        threshold: 5
        duration: "1m"

# Secrets Management
secrets:
  trino:
    # These will be injected as environment variables
    username: "admin"
    password: ""  # Set via external secret management
    oauth:
      clientId: ""
      clientSecret: ""
  
  audit:
    encryptionKey: ""  # For sensitive audit log encryption

# Feature Flags
features:
  rateLimiting:
    enabled: true
  auditLogging:
    enabled: true
  securityEnforcement:
    enabled: true
  metricsCollection:
    enabled: true
  sqlInjectionDetection:
    enabled: true
