# Testing configuration - only essential components
# Use: helm install dashboard . -f values-testing.yaml

# Global configuration
global:
  namespace: dashboard
  imagePullPolicy: IfNotPresent
  storageClass: "standard"

# Component enablement flags - only what you need for testing
components:
  backend: true
  frontend: true
  fastapi: false        # ML service - disabled for testing
  trino: true
  postgres: true
  mysql: true
  schemaService: true
  mcpTrino: false       # MCP servers - disabled for testing
  mcpChart: false

# Backend Spring Boot service
backend:
  replicaCount: 1       # Reduced for testing
  image:
    repository: dashboard-backend
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "256Mi"    # Reduced for testing
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  env:
    fastapi:
      url: "http://dashboard-fastapi:8000"  # Will be ignored since fastapi disabled
    trino:
      url: "jdbc:trino://dashboard-trino:8080/memory/default"
      user: "admin"

# Frontend React service
frontend:
  replicaCount: 1       # Reduced for testing
  image:
    repository: dashboard-frontend
    tag: latest
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: "64Mi"     # Reduced for testing
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# FastAPI ML service - DISABLED for testing
fastapi:
  replicaCount: 1
  image:
    repository: dashboard-fastapi
    tag: dual-model
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  storage:
    enabled: false       # Disabled for testing

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: dashboard.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls: []

# Disable monitoring and autoscaling for testing
serviceMonitor:
  enabled: false

autoscaling:
  backend:
    enabled: false
  frontend:
    enabled: false
  fastapi:
    enabled: false

networkPolicy:
  enabled: false

podDisruptionBudget:
  enabled: false

# Trino database service
trino:
  replicaCount: 1
  image:
    repository: trinodb/trino
    tag: "435"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "1Gi"      # Reduced for testing
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  environment: "production"
  nodeId: "ffffffff-ffff-ffff-ffff-ffffffffffff"
  jvm:
    maxHeapSize: "1G"    # Reduced for testing
  config:
    enabled: true
  catalogs:
    memory:
      connector.name: "memory"
    tpch:
      connector.name: "tpch"
      tpch.splits-per-node: "4"
    postgresql:
      connector.name: "postgresql"
      connection-url: "jdbc:postgresql://dashboard-postgres:5432/sampledb"
      connection-user: "postgres"
      connection-password: "postgres"
    mysql:
      connector.name: "mysql"
      connection-url: "jdbc:mysql://dashboard-mysql:3306/ecommerce"
      connection-user: "mysql"
      connection-password: "mysql"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Demo databases - simplified configuration
demo:
  postgres:
    image:
      repository: postgres
      tag: "15-alpine"
    database: "sampledb"
    user: "postgres"
    password: "postgres"
    resources:
      requests:
        memory: "128Mi"  # Reduced for testing
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  mysql:
    image:
      repository: mysql
      tag: "8.0"
    database: "ecommerce"
    user: "mysql"
    password: "mysql"
    rootPassword: "mysql"
    resources:
      requests:
        memory: "128Mi"  # Reduced for testing
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"

# FAISS Schema Service
schemaService:
  replicaCount: 1
  image:
    repository: dashboard-schema-service
    tag: latest
  service:
    type: ClusterIP
    port: 8001
  resources:
    requests:
      memory: "256Mi"    # Reduced for testing
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  env:
    trino:
      host: "dashboard-trino"
      port: 8080
      user: "admin"
    refreshHours: 3
  storage:
    enabled: true
    size: 1Gi           # Reduced for testing
    storageClass: "standard"

# Environment-specific overrides
environment: testing
