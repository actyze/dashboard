# Default values for dashboard.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global configuration
global:
  namespace: dashboard
  imagePullPolicy: IfNotPresent
  storageClass: "standard"

# Service Account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Component enablement flags
components:
  backend: true          # Spring Boot orchestration service
  frontend: true         # React UI
  schemaService: true    # FAISS-based schema recommendations
  phiSqlLora: true      # Phi-4-mini LoRA SQL generator (CPU INT8)
  trino: true           # Trino for demo data
  demo:
    enabled: true       # Demo mode with sample data
    postgres: true
    mysql: true

# Backend Spring Boot service
backend:
  replicaCount: 1
  image:
    repository: dashboard-backend
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  env:
    phiSqlLora:
      url: "http://dashboard-phi-sql-lora:8000"
    schemaService:
      url: "http://dashboard-schema-service:8001"
    trino:
      url: "jdbc:trino://dashboard-trino:8080/memory/default"
      user: "admin"

# Frontend React service
frontend:
  replicaCount: 1
  image:
    repository: dashboard-frontend
    tag: latest
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: dashboard.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls: []

# Service Monitor for Prometheus (optional)
serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s

# Horizontal Pod Autoscaler
autoscaling:
  backend:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  frontend:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  fastapi:
    enabled: false  # ML service typically doesn't need autoscaling

# Network Policies
networkPolicy:
  enabled: false

# Pod Disruption Budgets
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Trino database service
trino:
  replicaCount: 1
  image:
    repository: trinodb/trino
    tag: "435"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  environment: "production"
  nodeId: "ffffffff-ffff-ffff-ffff-ffffffffffff"
  jvm:
    maxHeapSize: "2G"
  config:
    enabled: true
  catalogs:
    memory:
      connector.name: "memory"
    tpch:
      connector.name: "tpch"
      tpch.splits-per-node: "4"
    postgresql:
      connector.name: "postgresql"
      connection-url: "jdbc:postgresql://dashboard-postgres:5432/sampledb"
      connection-user: "postgres"
      connection-password: "postgres"
    mysql:
      connector.name: "mysql"
      connection-url: "jdbc:mysql://dashboard-mysql:3306/ecommerce"
      connection-user: "mysql"
      connection-password: "mysql"
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Demo mode configuration (optional)
demo:
  postgres:
    image:
      repository: postgres
      tag: "15-alpine"
    database: "ecommerce_demo"
    user: "demo_user"
    password: "demo_password"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
  mysql:
    image:
      repository: mysql
      tag: "8.0"
    database: "hrms"
    user: "demo_user"
    password: "demo_password"
    rootPassword: "root_password"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

# FAISS Schema Service
schemaService:
  replicaCount: 1
  image:
    repository: dashboard-schema-service
    tag: latest
  service:
    type: ClusterIP
    port: 8001
  resources:
    requests:
      memory: "768Mi"
      cpu: "250m"
    limits:
      memory: "1.5Gi"
      cpu: "500m"
  env:
    trino:
      host: "dashboard-trino"
      port: 8080
      user: "admin"
    refreshHours: 3
  storage:
    enabled: true
    size: 2Gi
    storageClass: "standard"

# Phi SQL LoRA Service (CPU INT8 Quantized)
phiSqlLora:
  replicaCount: 1
  image:
    repository: phi-sql-lora-clean
    tag: k8s
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    name: http
  resources:
    requests:
      memory: "8Gi"
      cpu: "4"
    limits:
      memory: "24Gi"
      cpu: "10"
  env:
    PYTHONUNBUFFERED: "1"
    TRANSFORMERS_CACHE: "/app/model_cache"
    HF_HOME: "/app/model_cache"
    TOKENIZERS_PARALLELISM: "false"
  persistence:
    enabled: true
    storageClass: "standard"
    accessMode: ReadWriteOnce
    size: 50Gi
    mountPath: /app/model_cache
  healthCheck:
    enabled: true
    path: /health
    port: 8000
    initialDelaySeconds: 300  # 5 minutes for model loading
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
    successThreshold: 1
  readinessCheck:
    enabled: true
    path: /health
    port: 8000
    initialDelaySeconds: 300  # 5 minutes for model loading
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  model:
    name: "phi-4-mini-trino-lora-cpu-int8"
    maxTokens: 1000
    temperature: 0.1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  securityContext:
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
      add:
      - NET_BIND_SERVICE

# Logging configuration
logging:
  level:
    dashboard: INFO
    root: INFO
  files:
    application:
      path: "/app/logs/dashboard-backend.log"

# Monitoring configuration
monitoring:
  metrics:
    enabled: true

# Environment-specific overrides
environment: local  # local, staging, production
