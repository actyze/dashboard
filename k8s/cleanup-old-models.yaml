apiVersion: batch/v1
kind: Job
metadata:
  name: cleanup-old-phi-models
  namespace: dashboard
spec:
  template:
    spec:
      containers:
      - name: cleanup
        image: ubuntu:22.04
        command: ["/bin/bash"]
        args:
        - -c
        - |
          echo "🧹 Cleaning up old Phi models from PVC"
          echo "========================================"
          
          # Install tools
          apt-get update && apt-get install -y tree du
          
          echo ""
          echo "📊 Current PVC contents:"
          ls -la /mnt/models/ || echo "Directory not found"
          
          if [ -d "/mnt/models" ]; then
            echo ""
            echo "📁 Directory structure:"
            tree /mnt/models/ -L 3 || find /mnt/models/ -type d | head -20
            
            echo ""
            echo "💾 Disk usage by directory:"
            du -h --max-depth=2 /mnt/models/ | sort -hr
            
            echo ""
            echo "🔍 Looking for old Phi models to remove..."
            
            # Find and list old model directories
            find /mnt/models/ -type d -name "*phi*3*" -o -name "*Phi-3*" | while read dir; do
              echo "Found old model: $dir"
              echo "Size: $(du -sh "$dir" | cut -f1)"
            done
            
            echo ""
            echo "🗑️  Removing old Phi-3/3.5 models..."
            
            # Remove old Phi-3 models
            find /mnt/models/ -type d -name "*phi*3*" -exec rm -rf {} + 2>/dev/null || true
            find /mnt/models/ -type d -name "*Phi-3*" -exec rm -rf {} + 2>/dev/null || true
            
            # Remove any cached files with phi3 in the name
            find /mnt/models/ -name "*phi3*" -exec rm -rf {} + 2>/dev/null || true
            find /mnt/models/ -name "*Phi-3*" -exec rm -rf {} + 2>/dev/null || true
            
            echo ""
            echo "✅ Cleanup completed!"
            echo ""
            echo "📊 Final disk usage:"
            du -h --max-depth=2 /mnt/models/ | sort -hr
            
            echo ""
            echo "📁 Remaining contents:"
            ls -la /mnt/models/
            
          else
            echo "⚠️  No models directory found - PVC might be empty"
          fi
          
          echo ""
          echo "🎉 Cleanup job finished!"
        volumeMounts:
        - name: old-models
          mountPath: /mnt/models
      volumes:
      - name: old-models
        persistentVolumeClaim:
          claimName: phi3-model-cache
      restartPolicy: Never
  backoffLimit: 1
