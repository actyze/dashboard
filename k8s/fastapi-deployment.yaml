apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-fastapi
  namespace: dashboard
  labels:
    app: dashboard-fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-fastapi
  template:
    metadata:
      labels:
        app: dashboard-fastapi
    spec:
      containers:
      - name: fastapi
        image: dashboard-fastapi:dual-model
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
          readOnly: true
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-fastapi-service
  namespace: dashboard
spec:
  selector:
    app: dashboard-fastapi
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
