kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: phi-sql-cluster
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
- role: worker
  # High-memory worker node for CPU inference
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "workload-type=cpu-intensive"
        max-pods: "50"
