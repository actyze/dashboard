version: '3.8'

services:
  nexus:
    build: .
    ports:
      - "8002:8002"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=dashboard
      - POSTGRES_USER=dashboard_user
      - POSTGRES_PASSWORD=dashboard_password
      - SCHEMA_SERVICE_URL=http://dashboard-schema-service:8001
      - LLM_SERVICE_URL=http://dashboard-fastapi:8000
      - TRINO_HOST=dashboard-trino
      - TRINO_PORT=8080
      - CACHE_ENABLED=true
      - CACHE_QUERY_MAX_SIZE=1000
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      - postgres
    networks:
      - nexus-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=dashboard
      - POSTGRES_USER=dashboard_user
      - POSTGRES_PASSWORD=dashboard_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  nexus-network:
    driver: bridge
