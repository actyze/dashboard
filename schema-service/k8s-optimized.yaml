apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: schema-service-model-cache
  namespace: dashboard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-schema-service-optimized
  namespace: dashboard
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: schema-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
      app.kubernetes.io/component: schema-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/component: schema-service
    spec:
      containers:
      - name: schema-service
        image: dashboard-schema-service:optimized
        ports:
        - containerPort: 8001
        env:
        - name: TRINO_HOST
          value: "dashboard-trino"
        - name: TRINO_PORT
          value: "8080"
        - name: TRINO_USER
          value: "admin"
        - name: SCHEMA_REFRESH_HOURS
          value: "3"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi" 
            cpu: "1000m"
        volumeMounts:
        - name: model-cache
          mountPath: /app/model_cache
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 10
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: schema-service-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-schema-service-optimized
  namespace: dashboard
spec:
  selector:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: schema-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
